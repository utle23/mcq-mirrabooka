{% extends "base.html" %}
{% block title %}Access Denied{% endblock %}
{% block content %}
<div class="text-center py-5">
  <i class="fas fa-lock fa-5x text-danger mb-4 d-block opacity-50"></i>
  <h2 class="text-danger">Admin Access Required</h2>
  <p class="text-muted">This feature is only available in Admin mode.</p>
  <p class="text-muted small">Please log out and log back in with the admin password.</p>
  <div class="d-flex gap-3 justify-content-center mt-4">
    <a href="/" class="btn btn-outline-secondary"><i class="fas fa-home me-1"></i>Dashboard</a>
    <a href="/logout" class="btn btn-danger"><i class="fas fa-sign-out-alt me-1"></i>Logout & Switch</a>
  </div>
</div>
{% endblock %}
